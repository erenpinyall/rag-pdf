<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF RAG Asistani</title>
  <style>
    :root {
      --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e; --border: #2a2a2a;
      --text: #e8e8e8; --text2: #888; --accent: #4a9eff; --accent2: #3a80cc;
      --green: #4ade80; --red: #f87171; --yellow: #fbbf24;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

    .layout { display: flex; height: 100vh; }

    .sidebar {
      width: 280px; background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0;
    }
    .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
    .sidebar-header h2 { font-size: 1rem; font-weight: 600; margin-bottom: 4px; }
    .sidebar-header p { font-size: 0.75rem; color: var(--text2); }

    .sidebar-section { padding: 12px 20px; border-bottom: 1px solid var(--border); }
    .sidebar-section h3 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text2); margin-bottom: 8px; }

    .upload-zone {
      border: 2px dashed var(--border); border-radius: 8px; padding: 20px;
      text-align: center; cursor: pointer; transition: all 0.2s;
    }
    .upload-zone:hover { border-color: var(--accent); background: rgba(74,158,255,0.05); }
    .upload-zone.dragover { border-color: var(--accent); background: rgba(74,158,255,0.1); }
    .upload-zone p { color: var(--text2); font-size: 0.8rem; margin-top: 6px; }
    .upload-zone .icon { font-size: 1.5rem; }

    .file-list { max-height: 200px; overflow-y: auto; }
    .file-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; background: var(--surface2); border-radius: 6px;
      margin-bottom: 4px; font-size: 0.8rem;
    }
    .file-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-item .badge { background: rgba(74,222,128,0.15); color: var(--green); padding: 2px 6px; border-radius: 4px; font-size: 0.65rem; margin-right: 8px; flex-shrink: 0; }
    .file-item .delete { background: none; border: none; color: var(--red); cursor: pointer; font-size: 0.9rem; padding: 2px 4px; flex-shrink: 0; }
    .file-item .delete:hover { opacity: 0.7; }

    .status-bar {
      margin-top: auto; padding: 12px 20px; border-top: 1px solid var(--border);
      font-size: 0.75rem; color: var(--text2);
    }
    .status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; }
    .status-dot.ok { background: var(--green); }
    .status-dot.error { background: var(--red); }

    .main { flex: 1; display: flex; flex-direction: column; }

    .chat-header {
      padding: 16px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .chat-header h1 { font-size: 1.1rem; font-weight: 600; }
    .session-controls { display: flex; gap: 8px; }
    .session-controls input {
      padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text); font-size: 0.8rem; width: 140px;
    }
    .btn-sm {
      padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text); font-size: 0.75rem; cursor: pointer;
    }
    .btn-sm:hover { background: var(--border); }
    .btn-sm.danger { border-color: rgba(248,113,113,0.3); color: var(--red); }

    .messages {
      flex: 1; overflow-y: auto; padding: 24px; display: flex;
      flex-direction: column; gap: 16px;
    }
    .msg { max-width: 75%; padding: 14px 18px; border-radius: 12px; line-height: 1.6; font-size: 0.9rem; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .msg.user { background: rgba(74,158,255,0.12); align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg.bot { background: var(--surface); border: 1px solid var(--border); align-self: flex-start; border-bottom-left-radius: 4px; }
    .msg.system { background: rgba(251,191,36,0.1); align-self: center; font-size: 0.8rem; color: var(--yellow); border-radius: 8px; padding: 8px 16px; }

    .msg.bot .answer-text { white-space: pre-wrap; }
    .msg.bot .sources {
      margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border);
    }
    .msg.bot .sources h4 { font-size: 0.7rem; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    .source-tag {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--surface2); padding: 3px 8px; border-radius: 4px;
      font-size: 0.7rem; color: var(--text2); margin: 2px;
    }
    .source-tag .score { color: var(--green); }

    .welcome {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 12px; color: var(--text2);
    }
    .welcome .icon { font-size: 3rem; opacity: 0.3; }
    .welcome p { font-size: 0.9rem; }
    .welcome .hint { font-size: 0.75rem; opacity: 0.5; }

    .input-area { padding: 16px 24px; border-top: 1px solid var(--border); }
    .input-row { display: flex; gap: 8px; }
    .input-row textarea {
      flex: 1; padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text); font-size: 0.9rem;
      font-family: inherit; resize: none; outline: none; min-height: 44px; max-height: 120px;
    }
    .input-row textarea:focus { border-color: var(--accent); }
    .send-btn {
      padding: 12px 20px; border-radius: 10px; border: none;
      background: var(--accent); color: #fff; font-size: 0.9rem; cursor: pointer;
      font-weight: 600; transition: all 0.2s; align-self: flex-end; min-height: 44px;
    }
    .send-btn:hover { background: var(--accent2); }
    .send-btn:disabled { background: var(--border); cursor: not-allowed; }

    .typing { display: inline-flex; gap: 4px; padding: 4px 0; }
    .typing span { width: 6px; height: 6px; background: var(--text2); border-radius: 50%; animation: bounce 1.4s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

    .hidden { display: none; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .progress-bar {
      width: 100%; height: 3px; background: var(--border); border-radius: 2px;
      overflow: hidden; margin-top: 8px;
    }
    .progress-bar .fill {
      height: 100%; background: var(--accent); border-radius: 2px;
      animation: progress 1.5s ease-in-out;
    }
    @keyframes progress { from { width: 0%; } to { width: 95%; } }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>PDF RAG</h2>
        <p>Belgelerini yukle, sorularini sor</p>
      </div>

      <div class="sidebar-section">
        <h3>PDF Yukle</h3>
        <div class="upload-zone" id="dropZone">
          <div class="icon">&#128196;</div>
          <p>Surukle birak veya tikla</p>
          <input type="file" id="fileInput" accept=".pdf" multiple hidden />
        </div>
      </div>

      <div class="sidebar-section">
        <h3>Yuklenen Belgeler</h3>
        <div class="file-list" id="fileList">
          <p style="font-size:0.75rem; color:var(--text2);">Henuz belge yok</p>
        </div>
      </div>

      <div class="status-bar" id="statusBar">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Kontrol ediliyor...</span>
      </div>
    </aside>

    <main class="main">
      <div class="chat-header">
        <h1>Sohbet</h1>
        <div class="session-controls">
          <input type="text" id="sessionInput" placeholder="Session ID" value="default" />
          <button class="btn-sm danger" onclick="clearHistory()">Temizle</button>
        </div>
      </div>

      <div class="messages" id="messages">
        <div class="welcome">
          <div class="icon">&#128269;</div>
          <p>PDF yukle ve sorularini sor</p>
          <p class="hint">Chunking, embedding ve hybrid search ile calisir</p>
        </div>
      </div>

      <div class="input-area">
        <form class="input-row" id="chatForm">
          <textarea id="questionInput" placeholder="PDF'lerin hakkinda sor..." rows="1"></textarea>
          <button type="submit" class="send-btn" id="sendBtn">Gonder</button>
        </form>
      </div>
    </main>
  </div>

  <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const messages = document.getElementById('messages');
    const chatForm = document.getElementById('chatForm');
    const questionInput = document.getElementById('questionInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const sessionInput = document.getElementById('sessionInput');

    let welcomeEl = document.querySelector('.welcome');

    // --- Upload ---
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
    fileInput.addEventListener('change', e => handleFiles(e.target.files));

    async function handleFiles(files) {
      for (const file of files) {
        if (!file.name.toLowerCase().endsWith('.pdf')) continue;
        const fd = new FormData();
        fd.append('file', file);
        const uploading = addSystemMsg(`Yukleniyor: ${file.name}...`);
        try {
          const res = await fetch('/upload', { method: 'POST', body: fd });
          const data = await res.json();
          if (res.ok) {
            uploading.remove();
            addSystemMsg(`${file.name} yuklendi (${data.chunks_added} chunk, ${data.total_pages} sayfa)`);
            loadSources();
          } else {
            uploading.remove();
            addSystemMsg(`Hata: ${data.detail}`);
          }
        } catch (err) {
          uploading.remove();
          addSystemMsg(`Baglanti hatasi: ${err.message}`);
        }
      }
    }

    // --- Sources ---
    async function loadSources() {
      try {
        const res = await fetch('/sources');
        const sources = await res.json();
        if (sources.length === 0) {
          fileList.innerHTML = '<p style="font-size:0.75rem; color:var(--text2);">Henuz belge yok</p>';
          return;
        }
        fileList.innerHTML = sources.map(s => `
          <div class="file-item">
            <span class="badge">PDF</span>
            <span class="name">${s.source}</span>
            <span style="font-size:0.65rem;color:var(--text2);margin-right:6px;">${s.chunk_count} chunk</span>
            <button class="delete" onclick="deleteSource('${s.source}')" title="Sil">&#10005;</button>
          </div>
        `).join('');
      } catch {}
    }

    async function deleteSource(name) {
      if (!confirm(`${name} silinecek?`)) return;
      try {
        await fetch(`/sources/${encodeURIComponent(name)}`, { method: 'DELETE' });
        loadSources();
        addSystemMsg(`${name} silindi.`);
      } catch {}
    }

    // --- Chat ---
    chatForm.addEventListener('submit', async e => {
      e.preventDefault();
      const q = questionInput.value.trim();
      if (!q) return;
      questionInput.value = '';
      questionInput.style.height = 'auto';
      removeWelcome();
      addUserMsg(q);
      sendBtn.disabled = true;

      const botDiv = document.createElement('div');
      botDiv.className = 'msg bot';
      botDiv.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
      messages.appendChild(botDiv);
      scrollBottom();

      try {
        const res = await fetch('/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            question: q,
            session_id: sessionInput.value || 'default',
            stream: true,
          }),
        });

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let answer = '';
        let sources = null;
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();
          for (const line of lines) {
            if (line.startsWith('data: ')) {
              const payload = line.slice(6);
              if (payload === '[DONE]') continue;
              try {
                const evt = JSON.parse(payload);
                if (evt.type === 'chunk') {
                  answer += evt.content;
                  botDiv.innerHTML = `<div class="answer-text">${formatText(answer)}</div>`;
                  scrollBottom();
                } else if (evt.type === 'done') {
                  sources = evt.sources;
                }
              } catch {}
            }
          }
        }

        let html = `<div class="answer-text">${formatText(answer)}</div>`;
        if (sources && sources.length) {
          html += '<div class="sources"><h4>Kaynaklar</h4>';
          sources.forEach(s => {
            html += `<span class="source-tag">&#128196; ${s.source} s.${s.page} <span class="score">(${s.score})</span></span>`;
          });
          html += '</div>';
        }
        botDiv.innerHTML = html;
      } catch (err) {
        botDiv.innerHTML = `<div class="answer-text" style="color:var(--red)">Hata: ${err.message}</div>`;
      }
      sendBtn.disabled = false;
      scrollBottom();
    });

    questionInput.addEventListener('input', () => {
      questionInput.style.height = 'auto';
      questionInput.style.height = Math.min(questionInput.scrollHeight, 120) + 'px';
    });

    // --- History ---
    async function clearHistory() {
      const sid = sessionInput.value || 'default';
      if (!confirm('Sohbet gecmisi silinecek?')) return;
      await fetch(`/history/${encodeURIComponent(sid)}`, { method: 'DELETE' });
      messages.innerHTML = '';
      addSystemMsg('Sohbet gecmisi temizlendi.');
    }

    // --- Health ---
    async function checkHealth() {
      try {
        const res = await fetch('/health');
        const data = await res.json();
        if (data.llm.status === 'ok') {
          statusDot.className = 'status-dot ok';
          statusText.textContent = `${data.llm.provider} / ${data.llm.model} (${data.vectorstore.total_chunks} chunk)`;
        } else {
          statusDot.className = 'status-dot error';
          statusText.textContent = `LLM: ${data.llm.error || data.llm.status}`;
        }
      } catch {
        statusDot.className = 'status-dot error';
        statusText.textContent = 'Sunucu baglanamiyor';
      }
    }

    // --- Helpers ---
    function addUserMsg(text) {
      const div = document.createElement('div');
      div.className = 'msg user';
      div.textContent = text;
      messages.appendChild(div);
      scrollBottom();
    }

    function addSystemMsg(text) {
      const div = document.createElement('div');
      div.className = 'msg system';
      div.textContent = text;
      messages.appendChild(div);
      scrollBottom();
      return div;
    }

    function removeWelcome() {
      if (welcomeEl) { welcomeEl.remove(); welcomeEl = null; }
    }

    function scrollBottom() {
      messages.scrollTop = messages.scrollHeight;
    }

    function formatText(text) {
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    loadSources();
    checkHealth();
    setInterval(checkHealth, 30000);
  </script>
</body>
</html>
